examples:
  - title: Valid GeoJSON Feature
    content: A Feature with the required `myProp` property.
    base-uri: http://example.com/features/
    snippets:
      - language: json
        code: |
          {
            "id": "f1",
            "type": "Feature",
            "geometry": {
              "type": "LineString",
              "coordinates": [
                [-111.67183507997295, 40.056709946862874],
                [-111.71, 40.156709946862874]
              ]
            },
            "properties": {
              "myProp": "Mandatory property example"
            }
          }
